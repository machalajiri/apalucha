    <!-- Tělo lahvičky -->
    <path d="M7,15 L5,44 Q5,48 9,48 L17,48 Q21,48 21,44 L19,15 Z" fill="#f0f5ff" stroke="#b0c4de" stroke-width="1.5"/>
    <!-- Rysky na lahvi -->
    <line x1="8" y1="22" x2="18" y2="22" stroke="#b0c4de" stroke-width="0.7" opacity="0.6"/>
    <line x1="7" y1="30" x2="19" y2="30" stroke="#b0c4de" stroke-width="0.7" opacity="0.6"/>
    <line x1="7" y1="38" x2="19" y2="38" stroke="#b0c4de" stroke-width="0.7" opacity="0.6"/>
    <!-- Mléko uvnitř -->
    <path d="M6,32 L5,44 Q5,48 9,48 L17,48 Q21,48 21,44 L20,32 Z" fill="#fff" opacity="0.8"/>
