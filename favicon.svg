    <ellipse cx="13" cy="4" rx="4" ry="4" fill="#f5a0b0" stroke="#d4708a" stroke-width="1.2"/>
    <rect x="9" y="7" width="8" height="4" rx="1" fill="#f5a0b0" stroke="#d4708a" stroke-width="1"/>
