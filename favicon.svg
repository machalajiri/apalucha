<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Krígl piva -->
  <g transform="translate(2,8)">
    <path d="M6,2 L3,48 L27,48 L24,2 Z" fill="#f5c842" stroke="#c67b3c" stroke-width="2"/>
    <rect x="6" y="2" width="18" height="10" rx="2" fill="#fff8e0" opacity="0.7"/>
    <line x1="6" y1="14" x2="24" y2="14" stroke="#c67b3c" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="26" x2="25" y2="26" stroke="#c67b3c" stroke-width="1" opacity="0.4"/>
    <path d="M24,10 Q34,10 34,22 Q34,32 24,32" fill="none" stroke="#c67b3c" stroke-width="3"/>
    <ellipse cx="9" cy="2" rx="5" ry="4" fill="#fff8e0"/>
    <ellipse cx="18" cy="1" rx="6" ry="5" fill="#fff8e0"/>
    <ellipse cx="25" cy="2" rx="4" ry="3.5" fill="#fff8e0"/>
  </g>
  <!-- Kojenecká lahvička s dudlíkem -->
